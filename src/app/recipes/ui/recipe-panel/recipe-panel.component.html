<article class="rounded-xl overflow-hidden shadow-md bg-white transition-shadow duration-200 hover:shadow-lg">
  <a class="block no-underline text-inherit" [routerLink]="['/recipes', recipe().id]">
    <div class="w-full aspect-[4/3] overflow-hidden bg-[#f5f0ea]">
      <img class="w-full h-full object-cover block" [src]="imageUrl()" [alt]="recipe().title" />
    </div>
    <div class="p-3">
      <h3 class="m-0 mb-1 text-[0.95rem] font-semibold">{{ recipe().title }}</h3>
      <p class="m-0 text-[0.8rem] text-gray-400">
        @if (recipe().servings === 1) {
          {{ 'recipes.list.metaSingular' | translate: { time: recipe().prepTime + recipe().cookTime } }}
        } @else {
          {{
            'recipes.list.meta'
              | translate: { time: recipe().prepTime + recipe().cookTime, servings: recipe().servings }
          }}
        }
      </p>
    </div>
  </a>
</article>
