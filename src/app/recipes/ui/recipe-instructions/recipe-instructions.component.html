<ol class="list-none m-0 p-0 flex flex-col gap-[0.85rem]">
  @for (step of steps(); track step.number) {
    <li class="flex gap-[0.6rem] leading-relaxed">
      <span class="text-brand font-bold shrink-0 min-w-[1.5rem]">{{ step.number }}</span>
      <span>{{ step.text }}</span>
    </li>
  }
</ol>
