<div class="flex items-center justify-center min-h-[calc(100vh-300px)] bg-white">
  <div class="bg-[rgb(242,242,242)] rounded-xl shadow-md min-h-[300px] px-[30px] pb-[30px] flex flex-col gap-4">

    <h1 class="text-2xl font-bold text-center pt-6">{{ 'auth.login.title' | translate }}</h1>

    @if (error()) {
      <p class="text-red-600 text-sm text-center">{{ error() }}</p>
    }

    <form (ngSubmit)="submit()" class="flex flex-col gap-4">

      <input
        pInputText
        type="email"
        name="email"
        [(ngModel)]="credentials.email"
        [placeholder]="'auth.login.email' | translate"
        class="w-full"
        required
      />

      <div class="flex flex-col gap-1">
        <label for="login-password" class="text-sm text-gray-500">{{ 'auth.login.password' | translate }}</label>
        <p-password
          inputId="login-password"
          name="password"
          [(ngModel)]="credentials.password"
          [feedback]="false"
          [fluid]="true"
          required
        />
      </div>

      <p-button
        type="submit"
        [label]="'auth.login.submit' | translate"
        [loading]="loading()"
        [fluid]="true"
      />

    </form>

    <p class="text-center text-sm text-gray-500">
      {{ 'auth.login.no_account' | translate }}
      <a routerLink="/register" class="text-brand font-medium hover:underline">{{ 'auth.login.register_link' | translate }}</a>
    </p>

  </div>
</div>
