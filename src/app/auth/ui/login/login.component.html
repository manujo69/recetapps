<div class="min-h-screen flex items-center justify-center bg-surface-100">
  <div class="bg-white rounded-2xl shadow-md w-full max-w-sm p-8 flex flex-col gap-5">

    <h1 class="text-3xl font-bold text-center text-surface-800">{{ 'auth.login.title' | translate }}</h1>

    @if (error()) {
      <p class="text-red-500 text-sm text-center">{{ error() }}</p>
    }

    <form (ngSubmit)="submit()" class="flex flex-col gap-4">

      <input
        pInputText
        type="email"
        name="email"
        [(ngModel)]="credentials.email"
        [placeholder]="'auth.login.email' | translate"
        class="w-full"
        required
      />

      <div class="flex flex-col gap-1">
        <label class="text-sm text-surface-500">{{ 'auth.login.password' | translate }}</label>
        <p-password
          name="password"
          [(ngModel)]="credentials.password"
          [feedback]="false"
          [fluid]="true"
          required
        />
      </div>

      <p-button
        type="submit"
        [label]="'auth.login.submit' | translate"
        [loading]="loading()"
        [fluid]="true"
      />

    </form>

    <p class="text-center text-sm text-surface-500">
      {{ 'auth.login.no_account' | translate }}
      <a routerLink="/register" class="text-primary font-medium hover:underline">{{ 'auth.login.register_link' | translate }}</a>
    </p>

  </div>
</div>
