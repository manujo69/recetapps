<div class="min-h-dvh bg-[#9bad7969] pb-8">

  <header class="flex items-center justify-between px-4 pt-4 pb-3 bg-[#faf9f7] sticky top-0 z-10">
    <a
      class="flex items-center justify-center w-9 h-9 rounded-full bg-white shadow text-gray-800 no-underline shrink-0"
      routerLink="/categories"
      [attr.aria-label]="'common.back_aria' | translate"
    >
      <i class="pi pi-arrow-left"></i>
    </a>
    <span class="font-semibold text-base">{{ 'categories.add.title' | translate }}</span>
    <span class="w-9"></span>
  </header>

  <form
    class="px-4 pt-5 md:px-8 md:pt-6 lg:max-w-[860px] lg:mx-auto lg:px-0 lg:pt-6"
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
  >

    <input
      class="block w-full mb-5 text-[1.4rem] font-bold border-b-2 border-gray-200 bg-transparent outline-none py-1 focus:border-brand placeholder:text-gray-200 placeholder:font-normal"
      type="text"
      formControlName="name"
      [placeholder]="'categories.add.name_placeholder' | translate"
    />

    <section class="mb-5 bg-white rounded-xl p-4 shadow-sm">
      <h2 class="m-0 mb-2 text-base font-semibold">{{ 'categories.add.description_title' | translate }}</h2>
      <textarea
        class="block w-full text-[0.9rem] text-gray-600 leading-relaxed border border-gray-100 rounded-lg p-2 resize-y outline-none focus:border-brand placeholder:text-gray-300"
        formControlName="description"
        rows="4"
        [placeholder]="'categories.add.description_placeholder' | translate"
      ></textarea>
    </section>

    @if (error()) {
      <p class="text-red-600 text-[0.85rem] mb-4">{{ error() }}</p>
    }

    <button
      class="flex items-center justify-center gap-2 w-full py-3.5 bg-brand text-white border-0 rounded-xl text-base font-semibold cursor-pointer transition-opacity enabled:hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed"
      type="submit"
      [disabled]="form.invalid || submitting()"
    >
      @if (submitting()) {
        <i class="pi pi-spin pi-spinner"></i>
      } @else {
        {{ 'categories.add.submit' | translate }}
      }
    </button>

  </form>
</div>
